<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>Fancify Shamcify</title>
		<script src="fancifymytext.js"></script>
	</head>

	<body>
		<h1>Fancify my Text</h1>

		<fieldset>
			<legend>Text</legend>
			<textarea id="textInput" rows="4" cols="30"></textarea>
		</fieldset>

		<fieldset>
			<legend>Fancify</legend>
			<button type="button" onclick="makeTextBigger()">Bigger!</button>
			<br /><br />

			<label>
				<input
					type="radio"
					id="fancyRadio"
					name="styleChoice"
					onchange="applyStyleChange()"
				/>
				FancyShmancy
			</label>

			<label>
				<input
					type="radio"
					id="boringRadio"
					name="styleChoice"
					onchange="applyStyleChange()"
					checked
				/>
				BoringBetty
			</label>

			<br /><br />
			<button type="button" onclick="mooifyText()">Moo</button>
		</fieldset>
	</body>
</html>
